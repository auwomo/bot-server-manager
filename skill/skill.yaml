name: gpu-metrics
description: |
  查询 GPU 训练集群状态（288 张 NVIDIA H20，地瓜云 K8s 集群）。
  数据来源：VictoriaMetrics 时序数据库，接收集群 Prometheus remote_write。
  可查询：GPU 分配/利用率、训练任务、Volcano 队列、温度功耗、故障检测、网络存储。

commands:
  - name: report
    description: 生成完整集群状态报告，包含 GPU 分配、任务列表、队列状态、告警和环境信息。适合定期汇报到群里。
    run: gpu-metrics report --format json

  - name: summary
    description: GPU 集群总览 — 总数/已分配/空闲/利用率/功耗/温度
    run: gpu-metrics summary --format json

  - name: jobs
    description: 当前运行中的 GPU 训练任务列表，按 namespace 和 pod 分组，显示每个任务占用的 GPU 数
    run: gpu-metrics jobs --format json

  - name: nodes
    description: 每个节点的 GPU 利用率、温度、功耗信息（36 节点，每节点 8 张 H20）
    run: gpu-metrics nodes --format json

  - name: utilization
    description: GPU 计算利用率详情 — Tensor Core/SM 活跃率、利用率分布（0%/1-25%/25-50%/50-75%/75-100%）
    run: gpu-metrics utilization --format json

  - name: power
    description: GPU 功耗信息 — 总功耗、每节点功耗、单卡最高/平均
    run: gpu-metrics power --format json

  - name: temperature
    description: GPU 温度监控 — 核心/显存平均和最高温度、超温数量、最热 Top5
    run: gpu-metrics temperature --format json

  - name: errors
    description: 故障检测 — XID 错误、行重映射、PCIe 重放、节点 NotReady 等硬件问题
    run: gpu-metrics errors --format json

  - name: network
    description: 网络状态 — InfiniBand 链路健康、NVLink 带宽、BER 错误
    run: gpu-metrics network --format json

  - name: queue
    description: Volcano 调度队列状态 — 各队列 GPU 容量/已分配/请求、运行中/排队任务数
    run: gpu-metrics queue --format json

  - name: storage
    description: GPFS 并行存储状态 — 挂载状态、读写吞吐
    run: gpu-metrics storage --format json

  - name: health
    description: 检查 VictoriaMetrics 数据库连接状态
    run: gpu-metrics health --format json

  - name: query
    description: 执行自定义 PromQL 查询（用于回答特殊问题）
    args:
      - name: promql
        description: PromQL 表达式
        required: true
    run: gpu-metrics query "{{promql}}" --format json
